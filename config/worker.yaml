# Worker Configuration File
# Edit this file after installation based on your environment

# Worker Basic Settings
worker:
  id: null                          # Auto-generated, or specify manually
  ip: null                          # Specify IP address, null means auto-detect
  port: 8088                        # HTTP service port
  namespace: meeting_public         # Namespace for categorizing Workers
  device_check_interval: 300        # Device check interval (seconds), 5 minutes
  service_retry_count: 3            # Service startup retry count
  service_retry_interval: 10        # Retry interval (seconds)
  action_step_delay: 0.5            # Action step delay (seconds), auto-wait between actions

# External Services (Required)
external_services:
  platform_api: "http://192.168.0.102:8000"  # Platform API URL
  ocr_service: "http://192.168.0.102:9021"   # OCR service URL

# Platform Settings
platforms:
  web:
    enabled: null                   # Auto-detect based on system
    headless: false                 # Headless mode
    browser_type: Chromium            # 使用系统 Chrome（不是 Chromium）以支持屏幕共享
    timeout: 30000                  # Timeout (ms)
    session_timeout: 300            # Session timeout (seconds)
    screenshot_dir: data/screenshots
    ignore_https_errors: true       # Ignore HTTPS certificate errors
    user_data_dir: data/chrome_profile  # Browser user data directory
    permissions:                    # Web permissions (camera, microphone, etc.)
      - camera
      - microphone
      - clipboard-read
      - clipboard-write
    # Clear Default directory on startup (keep Cache directory) to avoid account cache
    clear_profile_on_start: true
    # Request blacklist: intercept specific requests (e.g. JS files that timeout)
    # Action options: abort (cancel request), 404 (return 404), empty (return empty content)
    request_blacklist:
      - pattern: "uba.js"
        action: "404"
      - pattern: "tinyReporter.min.js"
        action: "404"
    # Token capture: listen for token headers in responses
    token_headers:
      - "X-Auth-Token"
      - "X-Request-Operator"
      # - "Authorization"  # Add more as needed

  android:
    enabled: null                   # Only on Windows
    u2_port: 7912                   # uiautomator2 port
    session_timeout: 300
    screenshot_dir: data/screenshots

  ios:
    enabled: null                   # Only on Windows
    go_ios_path: tools/go-ios/ios.exe  # go-ios 可执行文件路径
    agent_port: 28100               # go-ios agent HTTP API 端口
    wda_base_port: 8100             # WDA 基础端口
    mjpeg_base_port: 9100           # MJPEG 基础端口
    wda_bundle_id: com.facebook.WebDriverAgentRunner.majy.xctrunner
    session_timeout: 300
    screenshot_dir: data/screenshots

  windows:
    enabled: null                   # Only on Windows
    session_timeout: 300
    screenshot_dir: data/screenshots

  mac:
    enabled: null                   # Only on macOS
    session_timeout: 300
    screenshot_dir: data/screenshots

# Image Matching Settings
image_matching:
  default_threshold: 0.8            # Default matching threshold
  methods:                          # Supported matching methods
    - template                      # Template matching
    - sift                          # Feature point matching

# Logging Settings
logging:
  level: INFO                       # Log level: DEBUG / INFO / WARNING / ERROR
  file: null                        # Log file path, null means default (exe_dir/worker.log)
  max_size: 52428800                # Max file size in bytes, default 50MB
  backup_count: 5                   # Number of backup files to keep

# Upgrade Settings
upgrade:
  check_url: ""                     # Upgrade check API URL, e.g. "http://192.168.0.102:8000/get_worker_upgrade"
  check_timeout: 30                 # Upgrade check timeout (seconds)
  download_timeout: 300             # Download timeout (seconds)

# Unlock Screen Settings (iOS/Android only)
unlock:
  # 默认解锁密码
  password: "3665"

  # 点击间隔（毫秒）
  click_interval: 150

  # iOS unlock method per device (物理分辨率)
  # 解锁方式：home_key（按HOME键出现密码界面）或 swipe_up（向上滑动）
  ios_unlock_method:
    # iPhone 8 / iPhone SE (750x1334) - 按 HOME 键解锁
    "750x1334": "home_key"
    # iPhone 11 / iPhone XR (828x1792) - 按 HOME 键解锁
    "828x1792": "home_key"
    # iPhone 14 / iPhone 15 (1170x2532) - 向上滑动解锁（Face ID 机型）
    "1170x2532": "swipe_up"
    # iPhone 14 Pro / iPhone 15 Pro (1179x2556) - 向上滑动解锁
    "1179x2556": "swipe_up"
    # iPhone 14 Pro Max / iPhone 15 Pro Max (1290x2796) - 向上滑动解锁
    "1290x2796": "swipe_up"
    # 默认方式
    default: "home_key"

  # iOS password keypad coordinates (物理分辨率，即真实像素尺寸)
  # 键盘布局: 1 2 3 / 4 5 6 / 7 8 9 / 0
  # 配置方式：按物理分辨率配置，运行时自动匹配
  # 获取方法：截图后查看图片尺寸即为物理分辨率
  ios_keypad:
    # iPhone 8 / iPhone SE (750x1334 物理分辨率)
    "750x1334":
      "1": {x: 167, y: 483}
      "2": {x: 375, y: 483}
      "3": {x: 570, y: 483}
      "4": {x: 167, y: 670}
      "5": {x: 375, y: 670}
      "6": {x: 570, y: 670}
      "7": {x: 167, y: 838}
      "8": {x: 375, y: 838}
      "9": {x: 570, y: 838}
      "0": {x: 375, y: 1010}

    # iPhone 11 / iPhone XR (828x1792 物理分辨率)
    "828x1792":
      "1": {x: 104, y: 760}
      "2": {x: 276, y: 760}
      "3": {x: 448, y: 760}
      "4": {x: 104, y: 880}
      "5": {x: 276, y: 880}
      "6": {x: 448, y: 880}
      "7": {x: 104, y: 1000}
      "8": {x: 276, y: 1000}
      "9": {x: 448, y: 1000}
      "0": {x: 276, y: 1120}

    # iPhone 14 / iPhone 15 (1170x2532 物理分辨率)
    "1170x2532":
      "1": {x: 144, y: 1080}
      "2": {x: 390, y: 1080}
      "3": {x: 636, y: 1080}
      "4": {x: 144, y: 1260}
      "5": {x: 390, y: 1260}
      "6": {x: 636, y: 1260}
      "7": {x: 144, y: 1440}
      "8": {x: 390, y: 1440}
      "9": {x: 636, y: 1440}
      "0": {x: 390, y: 1620}

    # iPhone 14 Pro / iPhone 15 Pro (1179x2556 物理分辨率)
    "1179x2556":
      "1": {x: 147, y: 1095}
      "2": {x: 393, y: 1095}
      "3": {x: 639, y: 1095}
      "4": {x: 147, y: 1275}
      "5": {x: 393, y: 1275}
      "6": {x: 639, y: 1275}
      "7": {x: 147, y: 1455}
      "8": {x: 393, y: 1455}
      "9": {x: 639, y: 1455}
      "0": {x: 393, y: 1635}

    # iPhone 14 Pro Max / iPhone 15 Pro Max (1290x2796 物理分辨率)
    "1290x2796":
      "1": {x: 162, y: 1200}
      "2": {x: 430, y: 1200}
      "3": {x: 698, y: 1200}
      "4": {x: 162, y: 1400}
      "5": {x: 430, y: 1400}
      "6": {x: 698, y: 1400}
      "7": {x: 162, y: 1600}
      "8": {x: 430, y: 1600}
      "9": {x: 698, y: 1600}
      "0": {x: 430, y: 1800}

    # 后备默认配置（无法匹配分辨率时使用 iPhone 8）
    default:
      "1": {x: 92, y: 570}
      "2": {x: 250, y: 570}
      "3": {x: 408, y: 570}
      "4": {x: 92, y: 670}

# 录屏配置
recording:
  output_dir: data/recordings    # 输出目录
  default_fps: 10                # 默认帧率
  max_timeout_ms: 7200000        # 最大超时（毫秒），2小时

# WebSocket 推流配置
websocket_streaming:
  max_connections_per_device: 3  # 单设备最大连接数
  send_timeout_seconds: 30       # 发送超时（秒），超时后自动断开连接
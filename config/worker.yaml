# Worker Configuration File
# Edit this file after installation based on your environment

# Worker Basic Settings
worker:
  id: null                          # Auto-generated, or specify manually
  ip: null                          # Specify IP address, null means auto-detect
  port: 8088                        # HTTP service port
  namespace: meeting_public         # Namespace for categorizing Workers
  discover_android_devices: false   # Enable Android device discovery
  discover_ios_devices: false       # Enable iOS device discovery
  device_check_interval: 300        # Device check interval (seconds), 5 minutes
  service_retry_count: 3            # Service startup retry count
  service_retry_interval: 10        # Retry interval (seconds)
  action_step_delay: 0.5            # Action step delay (seconds), auto-wait between actions

# External Services (Required)
external_services:
  platform_api: "http://192.168.0.102:8000"  # Platform API URL
  ocr_service: "http://192.168.0.102:9021"   # OCR service URL

# Platform Settings
platforms:
  web:
    enabled: null                   # Auto-detect based on system
    headless: false                 # Headless mode
    browser_type: Chromium          # Use system Chrome for screen sharing support
    timeout: 30000                  # Timeout (ms)
    session_timeout: 300            # Session timeout (seconds)
    screenshot_dir: data/screenshots
    ignore_https_errors: true       # Ignore HTTPS certificate errors
    user_data_dir: data/chrome_profile  # Browser user data directory
    permissions:                    # Web permissions (camera, microphone, etc.)
      - camera
      - microphone
      - clipboard-read
      - clipboard-write
    # Clear Default directory on startup (keep Cache directory)
    clear_profile_on_start: true
    # Request blacklist: intercept specific requests
    # Action options: abort, 404, empty
    request_blacklist:
      - pattern: "uba.js"
        action: "404"
      - pattern: "tinyReporter.min.js"
        action: "404"
    # Token capture: listen for token headers in responses
    token_headers:
      - "X-Auth-Token"
      - "X-Request-Operator"

  android:
    enabled: null                   # Only on Windows
    u2_port: 7912                   # uiautomator2 port
    session_timeout: 300
    screenshot_dir: data/screenshots

  ios:
    enabled: null                   # Only on Windows
    go_ios_path: tools/go-ios/ios.exe  # go-ios executable path
    agent_port: 60105               # go-ios agent HTTP API port
    wda_base_port: 8100             # WDA base port
    mjpeg_base_port: 9100           # MJPEG base port
    wda_bundle_id: com.cloudlink.WebDriverAgentRunner.new.xctrunner
    wda_testrunner_bundle_id: com.cloudlink.WebDriverAgentRunner.new.xctrunner
    wda_xctest_config: WebDriverAgentRunner.xctest
    session_timeout: 300
    screenshot_dir: data/screenshots

  windows:
    enabled: null                   # Only on Windows
    session_timeout: 300
    screenshot_dir: data/screenshots

  mac:
    enabled: null                   # Only on macOS
    session_timeout: 300
    screenshot_dir: data/screenshots

# Image Matching Settings
image_matching:
  default_threshold: 0.8            # Default matching threshold
  methods:                          # Supported matching methods
    - template                      # Template matching
    - sift                          # Feature point matching

# Logging Settings
logging:
  level: INFO                       # Log level: DEBUG / INFO / WARNING / ERROR
  file: null                        # Log file path, null means default (exe_dir/worker.log)
  max_size: 52428800                # Max file size in bytes, default 50MB
  backup_count: 5                   # Number of backup files to keep

# Upgrade Settings
upgrade:
  check_url: ""                     # Upgrade check API URL
  check_timeout: 30                 # Upgrade check timeout (seconds)
  download_timeout: 300             # Download timeout (seconds)

# Unlock Screen Settings (iOS/Android only)
unlock:
  # Default unlock password
  password: "3665"

  # Click interval (milliseconds)
  click_interval: 150

  # iOS unlock method per device (physical resolution)
  # Methods: home_key (press HOME key) or swipe_up (swipe up)
  ios_unlock_method:
    # iPhone 8 / iPhone SE (750x1334) - HOME key unlock
    "750x1334": "home_key"
    # iPhone 11 / iPhone XR (828x1792) - HOME key unlock
    "828x1792": "home_key"
    # iPhone 14 / iPhone 15 (1170x2532) - Swipe up unlock (Face ID)
    "1170x2532": "swipe_up"
    # iPhone 14 Pro / iPhone 15 Pro (1179x2556) - Swipe up unlock
    "1179x2556": "swipe_up"
    # iPhone 14 Pro Max / iPhone 15 Pro Max (1290x2796) - Swipe up unlock
    "1290x2796": "swipe_up"
    # Default method
    default: "home_key"

  # iOS password keypad coordinates (physical resolution)
  # Keypad layout: 1 2 3 / 4 5 6 / 7 8 9 / 0
  # Configure by physical resolution, auto-matched at runtime
  # How to get: screenshot and check image size for physical resolution
  ios_keypad:
    # iPhone 8 / iPhone SE (750x1334)
    "750x1334":
      "1": {x: 167, y: 483}
      "2": {x: 375, y: 483}
      "3": {x: 570, y: 483}
      "4": {x: 167, y: 670}
      "5": {x: 375, y: 670}
      "6": {x: 570, y: 670}
      "7": {x: 167, y: 838}
      "8": {x: 375, y: 838}
      "9": {x: 570, y: 838}
      "0": {x: 375, y: 1010}

    # iPhone 11 / iPhone XR (828x1792)
    "828x1792":

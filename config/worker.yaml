# Worker 配置文件
# 打包后请根据实际环境修改此文件

# Worker 基础配置
worker:
  id: null                          # 自动生成，也可指定
  ip: null                          # 指定 IP 地址，null 表示自动获取
  port: 8088                        # HTTP 服务端口
  device_check_interval: 300        # 设备检测间隔(秒)，5分钟
  service_retry_count: 3            # 服务启动重试次数
  service_retry_interval: 10        # 重试间隔(秒)
  action_step_delay: 0.5            # 动作间隔延迟(秒)，两个action之间没有wait时自动等待

# 外部服务地址（必须配置）
external_services:
  platform_api: ""                  # 配置平台 API（如：http://platform.example.com/api/worker）
  ocr_service: "http://192.168.0.102:9021"                   # OCR 服务地址（如：http://192.168.1.100:8081）

# 平台配置
platforms:
  web:
    enabled: null                   # 根据系统自动判断
    headless: false                  # 无头模式
    browser_type: chromium          # chromium / firefox / webkit
    timeout: 30000                  # 超时时间(ms)
    session_timeout: 300            # 会话超时(秒)
    screenshot_dir: data/screenshots
    ignore_https_errors: true       # 忽略 HTTPS 证书错误
    user_data_dir: data/chrome_profile  # 浏览器用户数据目录
    permissions:                    # 网页权限（摄像头、麦克风等）
      - camera
      - microphone
    # 启动前清理 Default 目录数据（保留 Cache 目录），避免账号缓存
    clear_profile_on_start: true
    # 请求黑名单：拦截特定请求（如某些 JS 文件加载超时）
    # action 可选值：abort（中止请求）、404（返回404）、empty（返回空内容）
    request_blacklist:
      - pattern: "uba.js"
        action: "404"
      - pattern: "tinyReporter.min.js"
        action: "404"

  android:
    enabled: null                   # 仅 Windows
    u2_port: 7912                   # uiautomator2 端口
    session_timeout: 300
    screenshot_dir: data/screenshots

  ios:
    enabled: null                   # 仅 Windows
    wda_base_port: 8100             # WDA 基础端口
    wda_ipa_path: wda/WebDriverAgent.ipa
    session_timeout: 300
    screenshot_dir: data/screenshots

  windows:
    enabled: null                   # 仅 Windows
    session_timeout: 300
    screenshot_dir: data/screenshots

  mac:
    enabled: null                   # 仅 macOS
    session_timeout: 300
    screenshot_dir: data/screenshots

# 图像匹配配置
image_matching:
  default_threshold: 0.8            # 默认匹配阈值
  methods:                          # 支持的匹配方法
    - template                      # 模板匹配
    - sift                          # 特征点匹配

# 日志配置
logging:
  level: INFO                       # 日志级别: DEBUG / INFO / WARNING / ERROR
  file: null                        # 日志文件路径，null 表示使用默认路径（exe同目录/worker.log）
  max_size: 52428800                # 单文件最大字节数，默认 50MB
  backup_count: 5                   # 保留的备份文件数量
  

  # Android password keypad coordinates (物理分辨率)
  android_keypad:
    # 1080x2400 分辨率（常见 Android 机型）
    "1080x2400":
      "1": {x: 180, y: 850}
      "2": {x: 540, y: 850}
      "3": {x: 900, y: 850}
      "4": {x: 180, y: 950}
      "5": {x: 540, y: 950}

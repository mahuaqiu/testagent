      "7": {x: 180, y: 1050}
      "8": {x: 540, y: 1050}
      "9": {x: 900, y: 1050}
      "0": {x: 540, y: 1150}

    # 后备默认配置
    default:
      "1": {x: 90, y: 850}
      "2": {x: 270, y: 850}
      "3": {x: 450, y: 850}

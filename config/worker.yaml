# Recording Settings
recording:
  output_dir: data/recordings    # Output directory
  default_fps: 10                # Default frame rate
  max_timeout_ms: 7200000        # Max timeout (ms), 2 hours

# WebSocket Streaming Settings
websocket_streaming:
  max_connections_per_device: 3  # Max connections per device
  send_timeout_seconds: 30       # Send timeout (seconds)
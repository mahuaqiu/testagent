# 环境配置文件
# 通过环境变量 ENV 选择 dev / staging / prod

dev:
  base_url: "https://dev.example.com"
  api_base_url: "https://dev-api.example.com"

  # Web 端配置
  web:
    base_url: "https://dev.example.com"
    # Remote Worker 配置（用于被外部 agent 远程调度）
    remote:
      cdp_port: 9222              # CDP 调试端口
      cdp_endpoint: null          # 远程连接时填写，如 ws://remote-host:9222
      headless: false             # 默认有头模式，方便观察
      session_timeout: 300        # 会话超时秒数
      screenshot_dir: "data/screenshots"  # 截图保存目录
      auto_cleanup: true          # 自动清理超时会话
      cleanup_interval: 60        # 清理间隔秒数

  # Android 端配置
  android:
    platform: "Android"
    appium_server: "http://127.0.0.1:4723"
    desired_caps:
      platformName: "Android"
      automationName: "UiAutomator2"
      app: "/path/to/app-debug.apk"
    # Remote Worker 配置
    remote:
      session_timeout: 300
      screenshot_dir: "data/screenshots"

  # iOS 端配置
  ios:
    platform: "iOS"
    appium_server: "http://127.0.0.1:4724"
    desired_caps:
      platformName: "iOS"
      automationName: "XCUITest"
      app: "/path/to/app-debug.app"
    # Remote Worker 配置
    remote:
      session_timeout: 300
      screenshot_dir: "data/screenshots"

  # Windows 桌面端配置
  windows:
    app_path: "/path/to/app.exe"
    # Remote Worker 配置
    remote:
      session_timeout: 300
      screenshot_dir: "data/screenshots"

  # 数据库配置
  db:
    host: "127.0.0.1"
    port: 3306
    user: "test"
    password: "test123"
    database: "test_db"

staging:
  base_url: "https://staging.example.com"
  api_base_url: "https://staging-api.example.com"

  # Web 端配置
  web:
    base_url: "https://staging.example.com"
    remote:
      cdp_port: 9222
      cdp_endpoint: null
      headless: true             # staging 环境使用无头模式
      session_timeout: 300
      screenshot_dir: "data/screenshots"
      auto_cleanup: true
      cleanup_interval: 60

  # Android 端配置
  android:
    platform: "Android"
    appium_server: "http://127.0.0.1:4723"
    desired_caps:
      platformName: "Android"
      automationName: "UiAutomator2"
      app: "/path/to/app-staging.apk"
    remote:
      session_timeout: 300
      screenshot_dir: "data/screenshots"

  # iOS 端配置
  ios:
    platform: "iOS"
    appium_server: "http://127.0.0.1:4724"
    desired_caps:
      platformName: "iOS"
      automationName: "XCUITest"
      app: "/path/to/app-staging.app"
    remote:
      session_timeout: 300
      screenshot_dir: "data/screenshots"

  # Windows 桌面端配置
  windows:
    app_path: "/path/to/app.exe"
    remote:
      session_timeout: 300
      screenshot_dir: "data/screenshots"

  # 数据库配置
  db:
    host: "staging-db.example.com"
    port: 3306
    user: "test"
    password: "test123"
    database: "test_db"
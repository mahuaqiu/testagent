# Worker API 接口说明
# Base URL: http://{host}:{port} (默认端口 8080)

openapi: "3.0.0"
info:
  title: "Test Worker API"
  description: "多端自动化测试执行基建 API"
  version: "3.0.0"

servers:
  - url: "http://{host}:{port}"
    variables:
      host:
        default: "localhost"
      port:
        default: "8080"

paths:
  /status:
    get:
      summary: "获取 Worker 状态"
      description: "获取 Worker 详细状态信息"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              example:
                worker_id: "worker_abc123"
                status: "running"
                started_at: "2026-03-14T10:00:00.000000"
                supported_platforms: ["web", "windows", "android", "ios"]
                devices_count: 3
        "503":
          description: "Worker 未初始化"

  /devices:
    get:
      summary: "获取设备列表"
      description: "获取当前连接的所有设备信息"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              example:
                ip: "192.168.1.100"
                port: 8080
                devices:
                  web: []
                  windows: []
                  android: ["emulator-5554"]
                  ios: ["00008030-001234567890ABCD"]

  /task/execute:
    post:
      summary: "同步执行任务"
      description: "同步执行自动化测试任务，阻塞等待结果返回，不生成 task_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskRequest"
            example:
              platform: "web"
              actions:
                - action_type: "navigate"
                  value: "https://example.com"
                - action_type: "ocr_click"
                  value: "登录"
                - action_type: "screenshot"
                  value: "result"
              device_id: null
      responses:
        "200":
          description: "任务执行完成（不包含 task_id）"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResult"
        "503":
          description: "Worker 未初始化"

  /task/execute_async:
    post:
      summary: "异步执行任务"
      description: "异步执行自动化测试任务，立即返回 task_id，任务在后台执行"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskRequest"
            example:
              platform: "web"
              actions:
                - action_type: "navigate"
                  value: "https://example.com"
                - action_type: "ocr_click"
                  value: "登录"
      responses:
        "200":
          description: "任务已提交"
          content:
            application/json:
              example:
                task_id: "task_20260317_120000_abc123"
                status: "running"
        "409":
          description: "设备/平台冲突"
          content:
            application/json:
              example:
                detail: "Device/Platform is busy"
        "503":
          description: "Worker 未初始化"

  /task/{task_id}:
    get:
      summary: "查询任务结果"
      description: "根据任务 ID 查询执行结果。一次性查询：查询后任务从内存中销毁，再次查询返回 404"
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "任务状态或结果"
          content:
            application/json:
              examples:
                running:
                  summary: "执行中"
                  value:
                    task_id: "task_20260317_120000_abc123"
                    status: "running"
                completed:
                  summary: "执行完成"
                  value:
                    task_id: "task_20260317_120000_abc123"
                    status: "success"
                    platform: "web"
                    duration_ms: 1500
                    actions: []
        "404":
          description: "任务不存在"
          content:
            application/json:
              example:
                detail: "Task not found"
        "503":
          description: "Worker 未初始化"

    delete:
      summary: "取消任务"
      description: "取消正在执行的任务。取消逻辑：如果只有一个 action，执行完再取消；有多个 action，当前 action 执行完后停止。"
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "取消成功"
          content:
            application/json:
              example:
                success: true
                message: "Task cancelled"
        "404":
          description: "任务不存在"
          content:
            application/json:
              example:
                detail: "Task not found"
        "503":
          description: "Worker 未初始化"

  /devices/refresh:
    post:
      summary: "刷新设备列表"
      description: "重新扫描并更新设备列表"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              example:
                ip: "192.168.1.100"
                port: 8080
                devices:
                  web: []
                  android: ["emulator-5554"]

components:
  schemas:
    TaskRequest:
      type: object
      required:
        - platform
        - actions
      properties:
        platform:
          type: string
          enum: [web, android, ios, windows, mac]
          description: "目标平台"
        actions:
          type: array
          items:
            $ref: "#/components/schemas/Action"
          description: "动作列表"
        device_id:
          type: string
          description: "设备 ID（移动端必填）"
        user_id:
          type: string
          description: "用户标识"
        config:
          $ref: "#/components/schemas/TaskConfig"

    TaskConfig:
      type: object
      properties:
        timeout:
          type: integer
          default: 300000
          description: "总超时时间(ms)"
        action_timeout:
          type: integer
          default: 30000
          description: "单个动作超时时间(ms)"
        screenshot_on_error:
          type: boolean
          default: true
          description: "错误时是否截图"
        slow_motion:
          type: integer
          default: 0
          description: "慢动作延迟(ms)"
        retry_count:
          type: integer
          default: 0
          description: "失败重试次数"

    Action:
      type: object
      required:
        - action_type
      properties:
        action_type:
          type: string
          enum:
            - ocr_click
            - ocr_input
            - ocr_wait
            - ocr_assert
            - ocr_get_text
            - image_click
            - image_wait
            - image_assert
            - click
            - swipe
            - input
            - press
            - screenshot
            - wait
            - navigate
            - launch_app
            - close_app
          description: "动作类型"
        value:
          type: string
          description: "文字/URL/按键值"
        image_path:
          type: string
          description: "图像模板路径"
        offset:
          type: object
          properties:
            x:
              type: integer
            y:
              type: integer
          description: "点击偏移"
        threshold:
          type: number
          default: 0.8
          description: "图像匹配阈值"
        timeout:
          type: integer
          default: 30000
          description: "超时时间(ms)"
        match_mode:
          type: string
          enum: [exact, fuzzy, contains, regex]
          default: exact
          description: "OCR 匹配模式"
        x:
          type: integer
          description: "X 坐标"
        y:
          type: integer
          description: "Y 坐标"
        end_x:
          type: integer
          description: "终点 X 坐标（滑动）"
        end_y:
          type: integer
          description: "终点 Y 坐标（滑动）"
        direction:
          type: string
          enum: [up, down, left, right]
          description: "滑动方向"
        app_path:
          type: string
          description: "应用路径"
        bundle_id:
          type: string
          description: "iOS Bundle ID"
        package_name:
          type: string
          description: "Android 包名"

    TaskResult:
      type: object
      description: "任务执行结果。同步执行时不包含 task_id 字段"
      properties:
        task_id:
          type: string
          description: "任务 ID（仅异步执行返回）"
        status:
          type: string
          enum: [pending, running, success, failed, timeout, cancelled]
          description: "任务状态"
        platform:
          type: string
          description: "平台"
        started_at:
          type: string
          format: date-time
          description: "开始时间"
        finished_at:
          type: string
          format: date-time
          description: "结束时间"
        duration_ms:
          type: integer
          description: "执行耗时(ms)"
        actions:
          type: array
          items:
            $ref: "#/components/schemas/ActionResult"
        error:
          type: string
          description: "错误信息"
        error_screenshot:
          type: string
          description: "失败截图（base64 编码）"

    ActionResult:
      type: object
      properties:
        index:
          type: integer
          description: "动作索引"
        action_type:
          type: string
          description: "动作类型"
        status:
          type: string
          enum: [pending, running, success, failed, skipped]
          description: "动作状态"
        duration_ms:
          type: integer
          description: "执行耗时(ms)"
        output:
          type: string
          description: "输出内容"
        error:
          type: string
          description: "错误信息"
        screenshot:
          type: string
          description: "截图（base64 或路径）"
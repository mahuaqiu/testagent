# Docker Compose 配置
# 用于启动 OCR 服务和相关依赖

version: '3.8'

services:
  # OCR 服务
  ocr-service:
    build:
      context: ./ocr_service
      dockerfile: Dockerfile
    container_name: ocr-service
    ports:
      - "8081:8081"
    environment:
      - OCR_HOST=0.0.0.0
      - OCR_PORT=8081
      - OCR_LANG=ch
      - OCR_USE_GPU=false
    volumes:
      - ./data/ocr_cache:/app/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s  # PaddleOCR 首次启动需要下载模型
      retries: 3
    restart: unless-stopped
    networks:
      - autotest-network

  # Web Remote Worker（可选，用于远程测试执行）
  web-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: web-worker
    ports:
      - "8080:8080"
    environment:
      - ENV=dev
      - CDP_PORT=9222
    depends_on:
      - ocr-service
    networks:
      - autotest-network
    profiles:
      - worker  # 使用 --profile worker 启动

networks:
  autotest-network:
    driver: bridge

volumes:
  ocr-cache: